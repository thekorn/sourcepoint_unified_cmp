name: sourcepoint_unified_cmp
description: flutter plugin for the sourcepoint unified CMP,
  with integrations for Android and iOS
version: 0.2.1
homepage: https://github.com/thekorn/sourcepoint_unified_cmp
repository: https://github.com/thekorn/sourcepoint_unified_cmp
resolution: workspace

environment:
  sdk: "^3.9.0"
  flutter: ">=3.0.0"

flutter:
  plugin:
    platforms:
      android:
        default_package: sourcepoint_unified_cmp_android
      ios:
        default_package: sourcepoint_unified_cmp_ios

dependencies:
  flutter:
    sdk: flutter
  sourcepoint_unified_cmp_android: ^0.2.1
  sourcepoint_unified_cmp_ios: ^0.2.1
  sourcepoint_unified_cmp_platform_interface: ^0.2.1

dev_dependencies:
  build_runner: ^2.15.0
  flutter_test:
    sdk: flutter
  mockito: ^5.6.4
  mocktail: ^1.0.5
  plugin_platform_interface: ^2.1.8
  very_good_analysis: ^10.2.0
